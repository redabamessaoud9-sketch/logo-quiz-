<style>
    /* Styles spécifiques pour le nouveau Game Screen */
    .game-page-container {
        display: flex;
        flex-direction: column;
        gap: 20px;
        padding: 20px;
        height: 100%;
        background: #F8FAFC;
    }

    /* Header Jeu */
    .game-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
    }
    .game-stats { display: flex; align-items: center; gap: 15px; font-weight: 700; color: var(--primary); }
    .hearts { color: #EF4444; font-size: 1.1rem; }

    /* Progress Bar */
    .progress-top { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; }
    .progress-bar-bg { height: 8px; background: #E2E8F0; border-radius: 4px; overflow: hidden; }
    .progress-bar-inner { height: 100%; background: var(--primary); width: 60%; transition: width 0.5s ease; }

    /* Logo Card */
    .logo-main-card {
        background: white;
        border-radius: 28px;
        padding: 40px;
        display: flex;
        justify-content: center;
        align-items: center;
        border: 1px solid #EDE9FE;
        box-shadow: 0 10px 30px rgba(124, 58, 237, 0.08);
        min-height: 250px;
    }
    .logo-main-card img { max-width: 100%; height: auto; }

    /* Grille Réponses 2x2 */
    .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn-answer {
        padding: 20px;
        border-radius: 20px;
        border: 2px solid #E2E8F0;
        background: white;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
    }
    .btn-answer:hover { border-color: var(--primary); background: #F5F3FF; }
    .btn-answer.correct { background: #22C55E; color: white; border-color: #22C55E; }
    .btn-answer.wrong { background: #EF4444; color: white; border-color: #EF4444; }

    /* Barre Indices */
    .hint-bar {
        display: flex;
        justify-content: space-around;
        background: white;
        padding: 15px;
        border-radius: 20px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .btn-hint {
        display: flex; flex-direction: column; align-items: center; gap: 5px;
        border: none; background: none; cursor: pointer; color: var(--text-muted); font-size: 0.7rem; font-weight: 600;
    }
    .btn-hint i { font-size: 1.2rem; color: var(--primary); }
</style>

<div id="game-screen" class="screen hidden">
    <div class="game-page-container">
        <div class="game-header">
            <div class="logo">LogoMaster</div>
            <div class="game-stats">
                <span>💎 2,450</span>
                <div class="hearts">❤️❤️🤍</div>
                <i class="fa-solid fa-gear" style="cursor:pointer"></i>
            </div>
        </div>

        <div>
            <div class="progress-top">
                <span>LEVEL 14 / 50</span>
                <span><i class="fa-regular fa-clock"></i> 00:32</span>
            </div>
            <div class="progress-bar-bg"><div class="progress-bar-inner"></div></div>
        </div>

        <div class="logo-main-card">
            <img id="logo-image" src="" alt="Logo à deviner">
        </div>

        <div class="answers-grid" id="answers-container">
            </div>

        <div class="hint-bar">
            <button class="btn-hint" onclick="useHint('50/50')"><i class="fa-solid fa-divide"></i> 50/50</button>
            <button class="btn-hint" onclick="useHint('reveal')"><i class="fa-solid fa-magnifying-glass"></i> Reveal</button>
            <button class="btn-hint" onclick="useHint('skip')"><i class="fa-solid fa-forward-step"></i> Skip</button>
        </div>
    </div>
</div>
