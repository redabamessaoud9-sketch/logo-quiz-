<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogoMaster - Quiz Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #7C3AED;
            --primary-gradient: linear-gradient(135deg, #8B5CF6, #7C3AED);
            --bg-light: #F8FAFC;
            --card-bg: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --streak-bg: #FFEDD5;
            --streak-text: #9A3412;
            --streak-border: #FED7AA;
            --grid-btn-bg: #F1F5F9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* Conteneur principal style Application Mobile Centrée */
        .app-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 480px;
            min-height: 850px;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .screen {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 90px; /* Espace pour la bottom nav */
            animation: fadeIn 0.4s ease-out;
        }

        .hidden {
            display: none !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ================= HEADER ================= */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
        }

        .header .logo {
            font-weight: 800;
            font-size: 1.3rem;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-icon {
            font-size: 1.2rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .header-icon:hover {
            color: var(--primary);
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6EE7B7, #3B82F6);
            border: 2px solid #FFF;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* ================= PARTIE CENTRALE & ICONE ================= */
        .brand-section {
            text-align: center;
            margin: 10px 0;
        }

        .app-icon-wrapper {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 24px;
            margin: 0 auto 16px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.12);
            border: 1px solid rgba(124, 58, 237, 0.05);
        }

        .app-icon-wrapper i {
            font-size: 3rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-section h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .brand-section p {
            font-size: 0.88rem;
            color: var(--text-muted);
            line-height: 1.4;
            padding: 0 20px;
        }

        /* ================= CARTE XP ================= */
        .xp-card {
            background: #FFFFFF;
            border-radius: 20px;
            padding: 16px 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02);
            border: 1px solid #F1F5F9;
        }

        .xp-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .xp-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 0.5px;
        }

        .xp-value {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .level-number {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-main);
            line-height: 1.1;
            margin-bottom: 12px;
        }

        .progress-bar-container {
            width: 100%;
            height: 10px;
            background: #E2E8F0;
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 72.5%; /* Correspond à 1450/2000 */
            background: var(--primary-gradient);
            border-radius: 99px;
            animation: loadProgress 1s ease-in-out forwards;
        }

        @keyframes loadProgress {
            from { width: 0%; }
        }

        /* ================= BOUTON PRINCIPAL JOUER ================= */
        .btn-play {
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 18px 24px;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.25);
            width: 100%;
        }

        .btn-play:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 24px rgba(124, 58, 237, 0.35);
        }

        .btn-play:active {
            transform: scale(0.98);
        }

        .btn-play-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* ================= GRILLE DE BOUTONS 2x2 ================= */
        .grid-menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .grid-item {
            background: var(--grid-btn-bg);
            border: none;
            border-radius: 20px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            cursor: pointer;
            text-align: left;
        }

        .grid-item i {
            font-size: 1.3rem;
            color: var(--primary);
        }

        .grid-item span {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .grid-item:hover {
            background: #EDE9FE;
            transform: translateY(-2px);
        }

        /* ================= CARTE SÉRIE (STREAK) ================= */
        .streak-card {
            background: var(--streak-bg);
            border: 1px solid var(--streak-border);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .streak-icon {
            font-size: 1.8rem;
        }

        .streak-details h4 {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--streak-text);
            margin-bottom: 2px;
        }

        .streak-details p {
            font-size: 0.8rem;
            color: var(--streak-text);
            opacity: 0.85;
            line-height: 1.3;
        }

        /* ================= BOTTOM NAVIGATION ================= */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 76px;
            background: #FFFFFF;
            border-top: 1px solid #E2E8F0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
            z-index: 10;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.72rem;
            font-weight: 500;
            width: 60px;
        }

        .nav-item i {
            font-size: 1.2rem;
        }

        /* Onglet actif */
        .nav-item.active {
            color: var(--primary);
            font-weight: 700;
        }

        .nav-item.active i {
            background: var(--primary-gradient);
            color: white;
            padding: 8px 16px;
            border-radius: 16px;
            font-size: 1.1rem;
            margin-bottom: -2px;
            box-shadow: 0 4px 10px rgba(124, 58, 237, 0.2);
        }

        /* Styles pour les écrans de jeu afin qu'ils s'adaptent bien */
        .category-title, .game-title {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .logo-frame {
            background: #FFF;
            width: 100%;
            height: 220px;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            border: 1px solid #E2E8F0;
        }

        .logo-frame img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }

        .input-bar {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: 2px solid #E2E8F0;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            outline: none;
            background: #F8FAFC;
        }

        .input-bar:focus {
            border-color: var(--primary);
            background: #FFF;
        }

        .btn-action {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 6px 15px rgba(124, 58, 237, 0.2);
        }

        .btn-action:hover {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<div class="app-container">

    <div id="menu-screen" class="screen">
        <div class="header">
            <div class="logo">LogoMaster</div>
            <div class="header-actions">
                <i class="fa-solid fa-chart-simple header-icon" onclick="alert('Classement à venir')"></i>
                <i class="fa-solid fa-gear header-icon" onclick="alert('Paramètres à venir')"></i>
                <div class="avatar"></div>
            </div>
        </div>

        <div class="brand-section">
            <div class="app-icon-wrapper">
                <i class="fa-solid fa-lightbulb"></i>
            </div>
            <h1>LogoMaster</h1>
            <p>Testez vos connaissances sur les marques les plus célèbres du monde !</p>
        </div>

        <div class="xp-card">
            <div class="xp-header">
                <span class="xp-title">NIVEAU ACTUEL</span>
                <span class="xp-value">XP : 1450 / 2000</span>
            </div>
            <div class="level-number">24</div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill"></div>
            </div>
        </div>

        <button class="btn-play" onclick="showCategories()">
            <div class="btn-play-left">
                <i class="fa-solid fa-circle-play"></i>
                <span>Jouer</span>
            </div>
            <i class="fa-solid fa-chevron-right" style="font-size: 0.9rem; opacity: 0.8;"></i>
        </button>

        <div class="grid-menu">
            <button class="grid-item" onclick="showCategories()">
                <i class="fa-solid fa-folder-open"></i>
                <span>Catégories</span>
            </button>
            <button class="grid-item" onclick="alert('Classement bientôt disponible !')">
                <i class="fa-solid fa-trophy"></i>
                <span>Classement</span>
            </button>
            <button class="grid-item" onclick="alert('Boutique bientôt disponible !')">
                <i class="fa-solid fa-bag-shopping"></i>
                <span>Boutique</span>
            </button>
            <button class="grid-item" onclick="alert('Paramètres bientôt disponibles !')">
                <i class="fa-solid fa-sliders"></i>
                <span>Paramètres</span>
            </button>
        </div>

        <div class="streak-card">
            <div class="streak-icon">🔥</div>
            <div class="streak-details">
                <h4>Série de 5 jours !</h4>
                <p>Continuez comme ça pour gagner 50 XP bonus demain.</p>
            </div>
        </div>
    </div>

    <div id="category-screen" class="screen hidden">
        <h2 class="category-title">Catégories</h2>
        <div style="display: flex; flex-direction: column; gap: 10px; overflow-y: auto; max-height: 600px; padding-right: 4px;">
            <button class="btn-action" onclick="selectCategory('restaurants')"><i class="fas fa-utensils"></i> Restaurants</button>
            <button class="btn-action" onclick="selectCategory('voitures')"><i class="fas fa-car"></i> Voitures</button>
            <button class="btn-action" onclick="selectCategory('vetements')"><i class="fas fa-tshirt"></i> Vêtements</button>
            <button class="btn-action" onclick="selectCategory('technologie')"><i class="fas fa-microchip"></i> Technologie</button>
            <button class="btn-action" onclick="selectCategory('boissons')"><i class="fas fa-coffee"></i> Boissons</button>
            <button class="btn-action" onclick="selectCategory('equipes')"><i class="fas fa-futbol"></i> Équipes</button>
            <button class="btn-action" onclick="selectCategory('pays')"><i class="fas fa-globe-americas"></i> Pays</button>
            <button class="btn-action" style="background: #64748B;" onclick="goBackToMenu()">Retour</button>
        </div>
    </div>

    <div id="game-screen" class="screen hidden">
        <h2 class="game-title" id="game-cat-title">Quiz</h2>
        <div class="logo-frame"><img id="logo-image" src="" alt="Logo"></div>
        <input type="text" id="answer-input" class="input-bar" placeholder="RÉPONSE...">
        <button class="btn-action" onclick="checkAnswer()">VALIDER</button>
        <button class="btn-action" style="background: #64748B; margin-top: auto;" onclick="goBackToMenu()">Quitter</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="goBackToMenu()">
            <i class="fa-solid fa-gamepad"></i>
            <span>Play</span>
        </div>
        <div class="nav-item" onclick="alert('Boutique')">
            <i class="fa-solid fa-bag-shopping"></i>
            <span>Shop</span>
        </div>
        <div class="nav-item" onclick="alert('Classement')">
            <i class="fa-solid fa-trophy"></i>
            <span>Rank</span>
        </div>
        <div class="nav-item" onclick="alert('Profil')">
            <i class="fa-solid fa-user"></i>
            <span>Profile</span>
        </div>
    </div>

</div>

<script>
    const gameCategories = {
        restaurants: [
            { stage: 1, logo: "burger-king.png", answer: "burger king" },
            { stage: 2, logo: "kfc.png", answer: "kfc" },
            { stage: 3, logo: "pizza-hut.png", answer: "pizza hut" },
            { stage: 4, logo: "starbucks.png", answer: "starbucks" },
            { stage: 5, logo: "dunkin-donuts.png", answer: "dunkin donuts" },
            { stage: 6, logo: "https://upload.wikimedia.org/wikipedia/en/b/b3/Taco_Bell_2016.svg", answer: "taco bell" }
        ],
        voitures: [
            { stage: 1, logo: "bmw.png", answer: "bmw" },
            { stage: 2, logo: "ferrari.png", answer: "ferrari" },
            { stage: 3, logo: "tesla.png", answer: "tesla" },
            { stage: 4, logo: "https://upload.wikimedia.org/wikipedia/commons/a/a2/Porsche_emblem.svg", answer: "porsche" }
        ],
        vetements: [
            { stage: 1, logo: "https://upload.wikimedia.org/wikipedia/commons/a/a6/Logo_NIKE.svg", answer: "nike" },
            { stage: 2, logo: "https://upload.wikimedia.org/wikipedia/commons/2/20/Adidas_Logo.svg", answer: "adidas" }
        ],
        technologie: [
            { stage: 1, logo: "https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg", answer: "google" },
            { stage: 2, logo: "https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg", answer: "apple" }
        ],
        boissons: [
            { stage: 1, logo: "coca-cola.png", answer: "coca cola" },
            { stage: 2, logo: "pepsi.png", answer: "pepsi" }
        ],
        equipes: [
            { stage: 1, logo: "https://upload.wikimedia.org/wikipedia/fr/b/bd/Logo_Paris_Saint-Germain.svg", answer: "psg" },
            { stage: 2, logo: "https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg", answer: "real madrid" }
        ],
        pays: [
            { stage: 1, logo: "https://upload.wikimedia.org/wikipedia/commons/c/c3/Flag_of_France.svg", answer: "france" },
            { stage: 2, logo: "https://upload.wikimedia.org/wikipedia/commons/0/05/Flag_of_Brazil.svg", answer: "bresil" }
        ]
    };

    let activeCat = '', currentStage = 0;

    function showCategories() {
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('category-screen').classList.remove('hidden');
    }

    function selectCategory(cat) {
        activeCat = cat;
        currentStage = 0;
        document.getElementById('category-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('game-cat-title').innerText = cat.toUpperCase();
        loadLevel();
    }

    function loadLevel() {
        const level = gameCategories[activeCat][currentStage];
        document.getElementById('logo-image').src = level.logo;
    }

    function checkAnswer() {
        const input = document.getElementById('answer-input').value.toLowerCase().trim();
        if (input === gameCategories[activeCat][currentStage].answer) {
            currentStage++;
            if (currentStage < gameCategories[activeCat].length) {
                loadLevel();
            } else {
                alert("Félicitations ! Vous avez terminé cette catégorie !");
                goBackToMenu();
            }
            document.getElementById('answer-input').value = "";
        } else {
            alert("Mauvaise réponse, essaie encore !");
        }
    }

    function goBackToMenu() {
        document.getElementById('category-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('menu-screen').classList.remove('hidden');
    }
</script>
</body>
</html>
