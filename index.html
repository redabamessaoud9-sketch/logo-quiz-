<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Quiz Master - Édition Bleue</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #00f5d4;
            --bg-dark: #05050d;
            --panel-bg: rgba(13, 12, 28, 0.85);
            --text-main: #f8fafc;
            --error: #ff3366;
        }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { background: var(--panel-bg); border-radius: 24px; width: 90%; max-width: 600px; padding: 40px; text-align: center; border: 1px solid rgba(0, 245, 212, 0.2); }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary); margin-bottom: 20px; }
        .btn { background: var(--primary); color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px 0; text-transform: uppercase; }
        .hidden { display: none !important; }
        .logo-frame { background: white; width: 200px; height: 200px; margin: 20px auto; display: flex; align-items: center; justify-content: center; border-radius: 20px; }
        img { max-width: 180px; max-height: 180px; }
        
        /* NOUVEAU STYLE POUR TON IMAGE BOUTON */
        .home-preview { 
            max-width: 300px; 
            border-radius: 20px; 
            margin-bottom: 20px; 
            border: 2px solid var(--primary);
            cursor: pointer; /* Change la souris en main */
            transition: transform 0.2s ease; /* Prépare l'animation */
        }
        
        /* Effet quand on passe la souris sur l'image */
        .home-preview:hover {
            transform: scale(1.05); /* Grossit l'image de 5% */
            box-shadow: 0 0 15px var(--primary); /* Ajoute un halo lumineux */
        }

        .input-bar { width: 80%; padding: 15px; margin: 20px 0; border-radius: 10px; border: none; text-align: center; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu-screen">
        <h1>LOGO QUIZ</h1>
        <img src="image_6444fd.png" alt="Accueil LogoMaster" class="home-preview" onclick="showCategories()">
        
        </div>

    <div id="category-screen" class="hidden">
        <h2>Catégories</h2>
        <button class="btn" onclick="selectCategory('restaurants')"><i class="fas fa-utensils"></i> Restaurants</button>
        <button class="btn" onclick="selectCategory('voitures')"><i class="fas fa-car"></i> Voitures</button>
        <button class="btn" onclick="selectCategory('vetements')"><i class="fas fa-tshirt"></i> Vêtements</button>
        <button class="btn" onclick="selectCategory('technologie')"><i class="fas fa-microchip"></i> Technologie</button>
        <button class="btn" onclick="selectCategory('boissons')"><i class="fas fa-coffee"></i> Boissons</button>
        <button class="btn" onclick="selectCategory('equipes')"><i class="fas fa-futbol"></i> Équipes</button>
        <button class="btn" onclick="selectCategory('pays')"><i class="fas fa-globe-americas"></i> Pays</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="logo-frame"><img id="logo-image" src="" alt="Logo"></div>
        <input type="text" id="answer-input" class="input-bar" placeholder="RÉPONSE...">
        <button class="btn" onclick="checkAnswer()">VALIDER</button>
        <div id="feedback"></div>
    </div>
</div>

<script>
    const gameCategories = {
        restaurants: [
            { stage: 1, logo: "burger-king.png", answer: "burger king" },
            { stage: 2, logo: "kfc.png", answer: "kfc" }
            // ... (garde le reste de tes tableaux de catégories ici)
        ],
        voitures: [
            { stage: 1, logo: "bmw.png", answer: "bmw" },
            { stage: 2, logo: "ferrari.png", answer: "ferrari" }
        ],
        vetements: [
            { stage: 1, logo: "https://upload.wikimedia.org/wikipedia/commons/a/a6/Logo_NIKE.svg", answer: "nike" },
            { stage: 2, logo: "https://upload.wikimedia.org/wikipedia/commons/2/20/Adidas_Logo.svg", answer: "adidas" }
        ],
        technologie: [
            { stage: 1, logo: "https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg", answer: "google" },
            { stage: 2, logo: "https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg", answer: "apple" }
        ],
        boissons: [
            { stage: 1, logo: "coca-cola.png", answer: "coca cola" },
            { stage: 2, logo: "pepsi.png", answer: "pepsi" }
        ],
        equipes: [
            { stage: 1, logo: "https://upload.wikimedia.org/wikipedia/fr/b/bd/Logo_Paris_Saint-Germain.svg", answer: "psg" },
            { stage: 2, logo: "https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg", answer: "real madrid" }
        ],
        pays: [
            { stage: 1, logo: "https://upload.wikimedia.org/wikipedia/commons/c/c3/Flag_of_France.svg", answer: "france" },
            { stage: 2, logo: "https://upload.wikimedia.org/wikipedia/commons/0/05/Flag_of_Brazil.svg", answer: "bresil" }
        ]
    };

    let activeCat = '', currentStage = 0;

    function showCategories() {
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('category-screen').classList.remove('hidden');
    }

    function selectCategory(cat) {
        activeCat = cat;
        currentStage = 0;
        document.getElementById('category-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        loadLevel();
    }

    function loadLevel() {
        const level = gameCategories[activeCat][currentStage];
        document.getElementById('logo-image').src = level.logo;
    }

    function checkAnswer() {
        const input = document.getElementById('answer-input').value.toLowerCase();
        if (input === gameCategories[activeCat][currentStage].answer) {
            currentStage++;
            if (currentStage < gameCategories[activeCat].length) loadLevel();
            else alert("Catégorie terminée !");
            document.getElementById('answer-input').value = "";
        } else {
            alert("Essaie encore !");
        }
    }
</script>
</body>
</html>
