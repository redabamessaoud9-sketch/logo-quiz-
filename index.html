<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogoMaster - Application</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #7C3AED; --bg-light: #F8FAFC; --text-main: #1E293B; --text-muted: #64748B; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; transition: 0.3s; }
        body { background: #E2E8F0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }
        .app-container { background: var(--bg-light); width: 100%; max-width: 500px; height: 90vh; border-radius: 32px; position: relative; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        
        /* Navigation & Screens */
        .screen { height: 100%; padding: 20px; overflow-y: auto; padding-bottom: 100px; }
        .hidden { display: none !important; }
        .bottom-nav { position: absolute; bottom: 0; width: 100%; height: 80px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #E2E8F0; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); cursor: pointer; font-size: 0.7rem; }
        .nav-item.active { color: var(--primary); font-weight: 700; }
        .nav-item.active i { background: var(--primary); color: white; padding: 10px; border-radius: 12px; }

        /* Styles Jeu */
        .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo-main-card { background: white; border-radius: 28px; padding: 30px; display: flex; justify-content: center; align-items: center; border: 1px solid #EDE9FE; box-shadow: 0 10px 20px rgba(0,0,0,0.03); margin-bottom: 20px; }
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .btn-answer { padding: 18px; border-radius: 20px; border: 2px solid #E2E8F0; background: white; font-weight: 600; cursor: pointer; }
        .btn-answer.correct { background: #22C55E; color: white; border-color: #22C55E; }
        .btn-answer.wrong { background: #EF4444; color: white; border-color: #EF4444; }
        .hint-bar { display: flex; justify-content: space-around; background: white; padding: 15px; border-radius: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="game-screen" class="screen">
        <div class="game-header">
            <div style="font-weight: 800; color: var(--primary);">LogoMaster</div>
            <div style="font-weight: 700;">💎 2,450</div>
        </div>
        
        <div class="logo-main-card">
            <img id="logo-image" src="" style="max-width: 150px;" alt="Logo">
        </div>

        <div class="answers-grid" id="answers-container"></div>

        <div class="hint-bar">
            <button class="nav-item" onclick="alert('50/50')"><i class="fa-solid fa-divide"></i> 50/50</button>
            <button class="nav-item" onclick="alert('Reveal')"><i class="fa-solid fa-magnifying-glass"></i> Reveal</button>
            <button class="nav-item" onclick="alert('Skip')"><i class="fa-solid fa-forward-step"></i> Skip</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active"><i class="fa-solid fa-gamepad"></i><span>Play</span></div>
        <div class="nav-item"><i class="fa-solid fa-bag-shopping"></i><span>Shop</span></div>
        <div class="nav-item"><i class="fa-solid fa-trophy"></i><span>Rank</span></div>
        <div class="nav-item"><i class="fa-solid fa-user"></i><span>Profile</span></div>
    </div>
</div>

<script>
    // Logique de jeu conservée
    const gameData = {
        currentLevel: { logo: "https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg", answer: "Google", options: ["Google", "Bing", "Yahoo", "DuckDuckGo"] }
    };

    function initGame() {
        document.getElementById('logo-image').src = gameData.currentLevel.logo;
        const container = document.getElementById('answers-container');
        container.innerHTML = '';
        
        gameData.currentLevel.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn-answer';
            btn.innerText = opt;
            btn.onclick = () => {
                if(opt === gameData.currentLevel.answer) btn.classList.add('correct');
                else btn.classList.add('wrong');
            };
            container.appendChild(btn);
        });
    }

    initGame();
</script>
</body>
</html>
